name: Deploy backend PHP para HostGator

# Publica a API PHP (backend-php) na subpasta /api do subdomínio
# pedidos.guimarques.dev.br. Roda composer install no CI e envia tudo
# (incluindo vendor/) por FTP. O arquivo .env vive APENAS no servidor
# (credenciais MySQL, JWT, Evolution, Ollama) e não é versionado nem enviado.

on:
  push:
    branches: [main]
    paths:
      - 'backend-php/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          # Casar com o cPanel da HostGator (ea-php83).
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, curl, json, gd, zip
          tools: composer

      - name: Composer install (sem dev)
        working-directory: backend-php
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Deploy via FTP (→ /api)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          # FTP_SERVER_DIR termina com "/"; a API vai para a subpasta api/.
          server-dir: ${{ secrets.FTP_SERVER_DIR }}api/
          local-dir:  ./backend-php/
          dangerous-clean-slate: false
          # Não enviar segredos/dev. O .env é criado manualmente no servidor.
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            .env.example
