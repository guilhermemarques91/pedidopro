name: Deploy frontend para HostGator

# Frontend (build estático React) publicado no document root do subdomínio
# pedidos.guimarques.dev.br. A API agora roda na mesma HostGator, em PHP,
# servida na subpasta /api (mesma origem) — por isso VITE_API_URL fica vazio
# e o app chama caminhos relativos "/api/...". O backend PHP é publicado pelo
# workflow deploy-backend.yml. Apenas a Evolution API e o Ollama seguem no PC.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (API na mesma origem, /api)
        working-directory: frontend
        env:
          # Vazio = chamadas relativas a "/api" (mesma origem, sem CORS).
          VITE_API_URL: ''
        run: |
          npm ci
          npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir:  ./frontend/dist/
          dangerous-clean-slate: false
          # Não apaga a pasta /api (backend PHP) ao sincronizar o frontend.
          exclude: |
            **/.git*
            **/.git*/**
            api/**
