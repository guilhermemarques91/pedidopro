name: Deploy frontend para HostGator

# Backend (Node + PostgreSQL) NÃO roda na HostGator (hospedagem compartilhada
# Apache/PHP/MySQL) — ele fica no PC local exposto via Cloudflare tunnel em
# pedidopro-api.guimarques.dev.br. Aqui publicamos apenas o build estático do
# frontend React no document root do subdomínio pedidos.guimarques.dev.br.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (apontando para a API pública)
        working-directory: frontend
        env:
          VITE_API_URL: https://pedidopro-api.guimarques.dev.br
        run: |
          npm ci
          npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir:  ./frontend/dist/
          dangerous-clean-slate: false
